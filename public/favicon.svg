<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- White circular background -->
  <circle cx="32" cy="32" r="30" fill="white"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#1e1b6e" stroke-width="2"/>
  
  <!-- Shield shape (scaled down) -->
  <path d="M16 12 H48 V36 Q48 52 32 58 Q16 52 16 36 Z" 
        fill="none" stroke="#1e1b6e" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Letter N -->
  <text x="22" y="34" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="bold" fill="#1e1b6e">N</text>
  
  <!-- Letter F -->
  <text x="34" y="34" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="bold" fill="#1e1b6e">F</text>
  
  <!-- Small grape dots -->
  <circle cx="30" cy="18" r="1.5" fill="#4a3f8a"/>
  <circle cx="34" cy="18" r="1.5" fill="#4a3f8a"/>
  <circle cx="32" cy="16" r="1.2" fill="#6b5fb0"/>
  
  <!-- Seeds below -->
  <ellipse cx="26" cy="41" rx="2" ry="2.5" fill="#1e1b6e" transform="rotate(-10 26 41)"/>
  <ellipse cx="32" cy="42" rx="2" ry="2.5" fill="#1e1b6e"/>
  <ellipse cx="38" cy="41" rx="2" ry="2.5" fill="#1e1b6e" transform="rotate(10 38 41)"/>
  
  <!-- Vineyard lines -->
  <g stroke="#1e1b6e" stroke-width="0.7" opacity="0.7">
    <line x1="32" y1="46" x2="22" y2="53"/>
    <line x1="32" y1="46" x2="27" y2="54"/>
    <line x1="32" y1="46" x2="32" y2="55"/>
    <line x1="32" y1="46" x2="37" y2="54"/>
    <line x1="32" y1="46" x2="42" y2="53"/>
  </g>
</svg>
